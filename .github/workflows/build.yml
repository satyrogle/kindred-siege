name: Kindred Siege CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-KindredSiege-${{ hashFiles('Assets/**/*.cs', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-KindredSiege-
            Library-

      - name: Build
        id: build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64

      - name: Print build errors on failure
        if: failure() && steps.build.outcome == 'failure'
        run: |
          echo "=== Searching for compiler errors ==="
          find /github/workspace -name "*.log" -exec grep -l "error CS" {} \; 2>/dev/null || true
          find /home -name "Editor.log" 2>/dev/null || true
          # Print any .log files that contain compiler errors
          for f in $(find / -name "*.log" -size +0 2>/dev/null | head -20); do
            if grep -q "error CS" "$f" 2>/dev/null; then
              echo "=== $f ==="
              grep "error CS" "$f"
            fi
          done
          # Also check stdout captured by game-ci
          echo "=== Build step output ==="

      - name: Upload build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KindredSiege-Windows
          path: build
