name: Kindred Siege CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-KindredSiege-${{ hashFiles('Assets/**/*.cs', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-KindredSiege-
            Library-

      - name: Build
        id: build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64

      - name: Extract build errors on failure
        if: failure() && steps.build.outcome == 'failure'
        run: |
          echo "## Build Errors" >> $GITHUB_STEP_SUMMARY
          # Search everywhere for log files with compiler errors
          FOUND=0
          for f in $(find / -name "*.log" -o -name "*.txt" 2>/dev/null | head -50); do
            if grep -q "error CS" "$f" 2>/dev/null; then
              echo "### $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep "error CS" "$f" | head -30 >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              FOUND=1
            fi
          done
          if [ "$FOUND" = "0" ]; then
            echo "No CS errors found in log files." >> $GITHUB_STEP_SUMMARY
            echo "### All log files:" >> $GITHUB_STEP_SUMMARY
            find / -name "*.log" 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KindredSiege-Windows
          path: build
